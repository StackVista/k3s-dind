name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - v*

  # Allows to run this via the Actions tab
  workflow_dispatch:

env:
  REGISTRY: quay.io
  IMAGE_NAME: stackstate/k3s-dind

jobs:
  publish:
    name: Publish the release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Standard tag for the branch (e.g., 'main' or 'pr-15')
            type=ref,event=branch
            # Standard tag for the tag (e.g., 'v1.2.3')
            type=ref,event=tag
            # Unique tag for every push using the short SHA (e.g., 'sha-ad1234f')
            type=sha,format=short,prefix=sha-
            # Optional: tag for PRs specifically
            type=ref,event=pr
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
